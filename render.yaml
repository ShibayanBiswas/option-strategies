# Render Blueprint — import at https://dashboard.render.com/blueprints
# Or copy these settings into existing Web Services manually.

services:
  - type: web
    name: option-strategies-python
    runtime: python
    rootDir: backend/python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"

  - type: web
    name: option-strategies-node
    runtime: node
    rootDir: backend/node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PYTHON_SERVICE_URL
        sync: false
